services:
  web:
    build: ./api
    container_name: bghub-web
    env_file:
      - ./api/.env
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py runserver 0.0.0.0:8000

  db:
    image: postgres:16
    container_name: bghub-db
    env_file:
      - ./api/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U boardgamehub -d boardgamehub"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: